{% extends "base.html" %}

{% block nav %}
    <a class="btn btn-primary btn-m" href="{% url 'create_task' %}">Добавить задачу</a>
{% endblock %}

{% block content %}
<div>
    <table class="table table-striped table-bordered text-center">
        <thead>
            <tr>
                <th>Описание</th>
                <th>Статус</th>
                <th>Дедлайн</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
            {% for task in tasks %}
            <tr>
                <td>{{ task.title }}</td>
                <td>{{ task.status }}</td>
                <td>{{ task.deadline }}</td>
                <td>
                    <a href="{% url 'details' task.id %}" class="text-decoration-none text-primary">Подробнее</a> /
                    <a href="{% url 'delete_task' task.id %}" class="text-decoration-none text-danger">Удалить</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4">Нет данных</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
