<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <div>
        {% for task in tasks %}
        <div>
            <p>{{task.title}}</p>
            <p>{{task.status}}</p>
            <p>{{task.deadline}}</p>
        </div>
         {% empty %}
            <p>Нет данных</p>
        {% endfor %}
    </div>
</body>
</html>
