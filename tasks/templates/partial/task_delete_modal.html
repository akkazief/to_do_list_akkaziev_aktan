  <div class="modal fade" id="task-{{ task.pk }}-Modal" tabindex="-1" aria-labelledby="taskModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="taskModalLabel">Удаление статьи {{ task.title }}</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Вы уверены что хотите удалить статью "{{ task.title }}"</p>
                    <form action="{% url 'delete_task' task.pk %}" id="delete-form" method="post">
                        {% csrf_token %}
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="submit" form="delete-form" class="btn btn-primary">Удалить</button>
                </div>
            </div>
        </div>
    </div>
